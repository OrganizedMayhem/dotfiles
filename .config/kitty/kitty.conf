# Kitty Config File
wayland_enable_ime yes
# Font settings
font_family      Fira Code
font_size        14.0

# Adjust window opacity
background_opacity 0.9

# Scrolling settings
scrollback_lines 10000

# Enable ligatures
enable_ligatures always

# Cursor
cursor_shape     block
cursor_blink     on

# Map custom shortcuts
map ctrl+c copy_to_clipboard
map ctrl+v paste_from_clipboard

# Disable bell sound
disable_bell     yes

# Set window padding
window_padding_width 5

# Color scheme
color_scheme     One Half Dark

# Allow resizing font with ctrl+scroll
font_size_increase_on_wheel yes

# Mouse support
mouse_hide_wait   3.0

# Custom window title format
window_title_format "{title}"

# Enable kitty tabs
#enabled_layouts   tall wide grid

# GPU acceleration settings
force_ltr_rendering    yes
gpu_shader_pipeline    yes

# Tiling window options
window_margin_width 10



# BEGIN_KITTY_THEME
# Obsidian
include current-theme.conf
# END_KITTY_THEME